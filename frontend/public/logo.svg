<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Fondo -->
    <rect width="512" height="512" rx="80" fill="url(#grad)"/>
    
    <!-- Cruz médica principal -->
    <g transform="translate(256, 256)">
        <!-- Vertical -->
        <rect x="-40" y="-140" width="80" height="280" fill="white" rx="10"/>
        <!-- Horizontal -->
        <rect x="-140" y="-40" width="280" height="80" fill="white" rx="10"/>
    </g>
    
    <!-- Píldora decorativa -->
    <ellipse cx="150" cy="150" rx="25" ry="35" fill="white" opacity="0.3" transform="rotate(-45 150 150)"/>
    <ellipse cx="362" cy="362" rx="25" ry="35" fill="white" opacity="0.3" transform="rotate(-45 362 362)"/>
</svg>
